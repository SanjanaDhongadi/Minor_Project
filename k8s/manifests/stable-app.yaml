apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable-app
  namespace: default
  labels:
    app: stable-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stable-app
  template:
    metadata:
      labels:
        app: stable-app
    spec:
      containers:
      - name: stable-app
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: stable-app-svc
  namespace: default
spec:
  selector:
    app: stable-app
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
