apiVersion: apps/v1
kind: Deployment
metadata:
  name: unstable-app
  namespace: default
  labels:
    app: unstable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unstable-app
  template:
    metadata:
      labels:
        app: unstable-app
    spec:
      containers:
      - name: unstable-app
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo Starting unstable-app...
            sleep 30
            echo Simulating crash!
            exit 1
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      restartPolicy: Always
